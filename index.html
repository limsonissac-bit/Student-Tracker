<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00df9a; --dark: #050505; --card: #111111; --text: #ffffff; --danger: #ff4d4d; --gray: #94a3b8; --success: #3b82f6; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.2s; }
        body { background: var(--dark); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        #main-app { display: none; width: 100%; height: 100%; }
        .sidebar { width: 340px; background: #0a0a0a; border-right: 1px solid #222; padding: 25px; overflow-y: auto; }
        .dashboard { flex: 1; padding: 40px; overflow-y: auto; scroll-behavior: smooth; }

        .card { background: var(--card); padding: 20px; border-radius: 18px; border: 1px solid #222; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; color: white; outline: none; }
        button { width: 100%; padding: 12px; background: var(--primary); color: black; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; margin-top: 10px; }
        
        .analytics-container { display: flex; align-items: center; gap: 30px; margin-bottom: 20px; background: linear-gradient(135deg, #111, #081a14); padding: 30px; border-radius: 24px; border: 1px solid #1a3a2a; }
        .ring-box { position: relative; width: 100px; height: 100px; transform: rotate(-90deg); }
        .ring-text { position: absolute; transform: rotate(90deg); top: 35%; left: 0; width: 100%; text-align: center; font-weight: 800; font-size: 20px; color: var(--primary); }

        .subject-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-bottom: 40px; }
        .sub-prog-card { background: #111; padding: 15px; border-radius: 12px; border: 1px solid #222; }
        .bar-bg { background: #222; height: 8px; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .bar-fill { background: var(--primary); height: 100%; width: 0%; transition: 0.5s; }

        .exam-card { border-left: 5px solid var(--primary); padding: 15px; background: #161616; border-radius: 12px; margin-bottom: 15px; position: relative;}
        .urgent { border-left-color: var(--danger); background: #1a0d0d; }
        .past-item { opacity: 0.6; border-left-color: var(--gray); filter: grayscale(0.5); margin-bottom: 10px;}
        
        .del-btn { position: absolute; top: 10px; right: 10px; background: transparent; color: var(--gray); border: none; font-size: 18px; cursor: pointer; width: auto; padding: 0; margin: 0; }
        .del-btn:hover { color: var(--danger); }

        .clear-btn { background: transparent; color: var(--danger); border: 1px solid var(--danger); font-size: 10px; width: auto; padding: 5px 10px; margin: 10px 0; font-weight: 600; }
        .clear-btn:hover { background: var(--danger); color: white; }

        .smart-plan { background: #000; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 13px; }
        .topic-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #222; position: relative; }
        .completed-text { text-decoration: line-through; color: var(--gray); }

        details { cursor: pointer; margin-top: 20px; background: #0f0f0f; border-radius: 12px; padding: 10px; border: 1px solid #222; }
        summary { font-weight: 800; color: var(--gray); list-style: none; display: flex; justify-content: space-between; align-items: center; }
        .badge { font-size: 10px; background: #222; padding: 4px 8px; border-radius: 20px; color: var(--gray); }
        .days-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        
        #auth-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--card); padding: 40px; border-radius: 24px; width: 350px; border: 1px solid #222; text-align: center; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="login-card">
        <h1 style="color:var(--primary)">Student Tracker</h1>
        <input type="text" id="uIn" placeholder="Username (User)">
        <input type="password" id="pIn" placeholder="Password (123456)">
        <button onclick="login()">Sign In</button>
    </div>
</div>

<div id="main-app">
    <div class="sidebar">
        <h2 id="greetName">Hello, User</h2>
        <div id="profileSection" style="margin-bottom: 20px;">
            <small id="semDisplay" style="color:var(--gray)">Semester 4</small>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <button onclick="editProfile()" style="background:#222; color:white; font-size:10px; height:30px; padding:0;">EDIT PROFILE</button>
                <button onclick="location.reload()" style="background:transparent; color:var(--danger); border:1px solid var(--danger); font-size:10px; height:30px; padding:0;">LOGOUT</button>
            </div>
        </div>

        <div class="card">
            <h3>Add Entry</h3>
            <select id="entryType" onchange="toggleInputs()">
                <option value="TOPIC">Add Topic</option>
                <option value="EXAM">Add Exam</option>
            </select>
            
            <small style="color:var(--gray); font-size:10px;">SELECT SUBJECT</small>
            <select id="fSub">
                <option value="Graph Theory">Graph Theory</option>
                <option value="OS">OS</option>
                <option value="DBMS">DBMS</option>
                <option value="DAA">Design and Analysis of Algorithms</option>
                <option value="Information Security">Information Security</option>
                <option value="Cyber Security">Cyber Security</option>
                <option value="Engineering Economics">Engineering Economics</option>
            </select>

            <div id="topicTitleArea">
                <small style="color:var(--gray); font-size:10px;">TOPIC NAME</small>
                <input type="text" id="fTop" placeholder="e.g. Memory Management">
            </div>

            <div id="dateArea">
                <small id="dateLabel" style="color:var(--gray); font-size:10px;">DEADLINE</small>
                <input type="date" id="fEnd">
            </div>

            <button onclick="saveEntry()">Save to Plan</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="analytics-container">
            <div class="ring-box">
                <svg width="100" height="100"><circle cx="50" cy="50" r="45" fill="none" stroke="#222" stroke-width="8"/><circle id="ring" cx="50" cy="50" r="45" fill="none" stroke="var(--primary)" stroke-width="8" stroke-dasharray="283" stroke-dashoffset="283" stroke-linecap="round"/></svg>
                <div class="ring-text" id="perc">0%</div>
            </div>
            <div>
                <h1 id="gradeLabel" style="margin:0; font-size:32px;">Level: Bad</h1>
                <p id="statsLabel" style="color:var(--gray); margin:0;">0 topics completed</p>
            </div>
        </div>

        <h3 style="color:var(--gray); margin-bottom:15px;">Subject Mastery</h3>
        <div class="subject-grid" id="subjectGrid"></div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:30px;">
            <div>
                <h3 style="color:var(--primary)">Upcoming Exams</h3>
                <div id="examList"></div>
                <details>
                    <summary>Past Exams <span class="badge" id="pastExCount">0</span> ▾</summary>
                    <button class="clear-btn" onclick="clearHistory('EXAM')">Wipe Exam History</button>
                    <div id="pastExamList" style="margin-top:15px;"></div>
                </details>
            </div>
            <div>
                <h3 style="color:var(--primary)">Topic Checklist</h3>
                <div class="card" id="topicList"></div>
                <details>
                    <summary>Past Topics <span class="badge" id="pastTopCount">0</span> ▾</summary>
                    <button class="clear-btn" onclick="clearHistory('TOPIC')">Wipe Topic History</button>
                    <div id="pastTopicList" style="margin-top:15px; opacity: 0.7;"></div>
                </details>
            </div>
        </div>
    </div>
</div>

<script>
    const S_URL = '  '; <!-- Add your supabase URL --> 
    const S_KEY = '  '; <!-- Add your supabase key -->
    const client = supabase.createClient(S_URL, S_KEY);
    
    const subjects = ["Graph Theory", "OS", "DBMS", "DAA", "Information Security", "Cyber Security", "Engineering Economics"];

    function toggleInputs() {
        const type = document.getElementById('entryType').value;
        document.getElementById('topicTitleArea').style.display = type === 'EXAM' ? 'none' : 'block';
        document.getElementById('dateLabel').innerText = type === 'EXAM' ? 'EXAM DATE' : 'DEADLINE';
    }

    function login() {
        if(document.getElementById('uIn').value === 'abhishek' && document.getElementById('pIn').value === '123456') {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            loadData();
        }
    }

    async function editProfile() {
        const newName = prompt("Enter Name:");
        const newSem = prompt("Enter Semester:");
        if(newName && newSem) {
            await client.from('student').update({ name: newName, semester: newSem }).eq('student_id', 1);
            location.reload();
        }
    }

    async function saveEntry() {
        const type = document.getElementById('entryType').value;
        const sub = document.getElementById('fSub').value;
        const top = type === 'TOPIC' ? document.getElementById('fTop').value : 'EXAM';
        const end = document.getElementById('fEnd').value;
        if(!end || (type === 'TOPIC' && !top)) return alert("Fill all fields!");

        const { error } = await client.from('plan').insert([{
            student_id: 1, subject: sub, topic: top, type: type, start_date: new Date().toISOString(), end_date: end
        }]);
        if(!error) { document.getElementById('fTop').value = ""; document.getElementById('fEnd').value = ""; loadData(); }
    }

    async function deleteEntry(id) {
        if(confirm("Are you sure you want to delete this?")) {
            const { error } = await client.from('plan').delete().eq('id', id);
            if(!error) loadData();
        }
    }

    async function clearHistory(type) {
        if(confirm(`This will permanently delete all completed ${type === 'EXAM' ? 'exams' : 'topics'}. Continue?`)) {
            const { error } = await client.from('plan').delete().eq('type', type).eq('is_completed', true);
            if(!error) loadData();
        }
    }

    async function loadData() {
        const { data: plans } = await client.from('plan').select('*').order('end_date', { ascending: true });
        const eBox = document.getElementById('examList'), peBox = document.getElementById('pastExamList');
        const tBox = document.getElementById('topicList'), ptBox = document.getElementById('pastTopicList');
        const grid = document.getElementById('subjectGrid');
        
        eBox.innerHTML = ""; peBox.innerHTML = ""; tBox.innerHTML = ""; ptBox.innerHTML = ""; grid.innerHTML = "";

        let done = 0, total = 0, pastEx = 0, pastTop = 0;
        const today = new Date().setHours(0,0,0,0);
        
        let subStats = {};
        subjects.forEach(s => subStats[s] = { done: 0, total: 0 });

        plans.forEach(item => {
            const itemDate = new Date(item.end_date).setHours(0,0,0,0);
            const days = Math.ceil((itemDate - today) / 86400000);

            if(item.type === 'EXAM') {
                const related = plans.filter(p => p.type === 'TOPIC' && p.subject === item.subject);
                const html = `
                    <div class="exam-card ${!item.is_completed && days <= 3 ? 'urgent' : ''} ${item.is_completed ? 'past-item' : ''}">
                        <button class="del-btn" onclick="deleteEntry(${item.id})">×</button>
                        <div style="display:flex; justify-content:space-between; padding-right: 20px;">
                            <b>${item.subject} Exam</b>
                            <span style="color:${days <= 3 && !item.is_completed ? 'var(--danger)' : 'var(--primary)'}; font-weight:800;">
                                ${item.is_completed ? 'COMPLETED' : (days === 0 ? 'TODAY' : days < 0 ? 'PAST DUE' : days + ' Days Left')}
                            </span>
                        </div>
                        <div class="smart-plan"><strong style="color:var(--primary)">Smart Plan:</strong><br>${related.length > 0 ? related.map(r => `${r.is_completed ? '✅' : '○'} ${r.topic}`).join('<br>') : 'No topics.'}</div>
                        ${!item.is_completed ? `<button onclick="markDone(${item.id})" style="height:30px; font-size:10px; background:#222; color:white;">Archive</button>` : ''}
                    </div>`;
                if(item.is_completed) { peBox.innerHTML += html; pastEx++; } else { eBox.innerHTML += html; }
            } else {
                total++; if(item.is_completed) done++;
                if(subStats[item.subject]) {
                    subStats[item.subject].total++;
                    if(item.is_completed) subStats[item.subject].done++;
                }

                const html = `
                    <div class="topic-row">
                        <div style="display:flex; flex-direction:column;">
                            <span class="${item.is_completed ? 'completed-text' : ''}"><b style="color:var(--primary)">${item.subject}</b>: ${item.topic}</span>
                            ${!item.is_completed ? `<span class="days-tag" style="color:${days <= 1 ? 'var(--danger)' : 'var(--gray)'}">${days === 0 ? 'Due Today' : days < 0 ? 'Overdue' : days + ' days left'}</span>` : ''}
                        </div>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <input type="checkbox" ${item.is_completed ? 'checked' : ''} onclick="toggleTopic(${item.id}, ${item.is_completed})">
                            <button class="del-btn" style="position:static;" onclick="deleteEntry(${item.id})">×</button>
                        </div>
                    </div>`;
                if(item.is_completed) { ptBox.innerHTML += html; pastTop++; } else { tBox.innerHTML += html; }
            }
        });

        subjects.forEach(s => {
            const perc = subStats[s].total > 0 ? Math.round((subStats[s].done / subStats[s].total) * 100) : 0;
            grid.innerHTML += `
                <div class="sub-prog-card">
                    <div style="display:flex; justify-content:space-between; font-size:12px;">
                        <span style="font-weight:bold">${s}</span>
                        <span style="color:var(--primary)">${perc}%</span>
                    </div>
                    <div class="bar-bg"><div class="bar-fill" style="width:${perc}%"></div></div>
                    <small style="color:var(--gray); font-size:9px;">${subStats[s].done}/${subStats[s].total} Topics</small>
                </div>`;
        });

        document.getElementById('pastExCount').innerText = pastEx;
        document.getElementById('pastTopCount').innerText = pastTop;
        updateProgress(done, total);
    }

    function updateProgress(done, total) {
        const ratio = total > 0 ? (done / total) : 0;
        document.getElementById('ring').style.strokeDashoffset = 283 - (283 * ratio);
        document.getElementById('perc').innerText = Math.round(ratio * 100) + "%";
        let g = ratio > 0.9 ? "Excellent" : ratio > 0.7 ? "Very Good" : ratio > 0.4 ? "Good" : "Bad";
        document.getElementById('gradeLabel').innerText = "Level: " + g;
        document.getElementById('gradeLabel').style.color = (g === 'Bad' ? 'var(--danger)' : 'var(--primary)');
        document.getElementById('statsLabel').innerText = `${done} of ${total} topics mastered`;
    }

    async function toggleTopic(id, status) { await client.from('plan').update({ is_completed: !status }).eq('id', id); loadData(); }
    async function markDone(id) { await client.from('plan').update({ is_completed: true }).eq('id', id); loadData(); }
</script>
</body>
</html>
